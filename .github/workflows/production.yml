name: production
on:
  push:
    branches:
      - main
permissions:
  packages: write
  contents: read
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY,ENV_FILE
          script: |
            # Reconstruir el .env en la VPS
            echo "$ENV_FILE" > /tmp/.env.service-auth

            # Login al registry
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Bajar la nueva imagen
            docker pull ghcr.io/$GITHUB_REPOSITORY:latest

            # Detener y eliminar el contenedor anterior
            docker stop service-auth-eventual || true
            docker rm service-auth-eventual || true

            # Levantar con el .env reconstruido
            docker run -d \
              --name service-auth-eventual \
              -p 8060:8080 \
              --restart unless-stopped \
              --env-file /tmp/.env.service-auth \
              ghcr.io/$GITHUB_REPOSITORY:latest

            # Limpiar el .env temporal
            rm /tmp/.env.service-auth

            # Limpiar cache de Laravel dentro del contenedor
            docker exec service-auth-eventual php artisan config:clear
            docker exec service-auth-eventual php artisan cache:clear
            docker exec service-auth-eventual php artisan route:clear
            docker exec service-auth-eventual php artisan route:cache

            # Limpiar capas viejas de Docker
            docker image prune -a -f --filter "until=72h"
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
